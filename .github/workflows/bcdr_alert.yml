name: Hourly BCDR Threat Scanner

# This determines WHEN the script runs
on:
  schedule:
    - cron: '0 * * * *'  # Runs at minute 0 of every hour (24 times a day)
  workflow_dispatch:     # Allows you to click a "Run Now" button on GitHub manually

jobs:
  scan_threats:
    runs-on: ubuntu-latest
    steps:
      - name: Download Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run BCDR Alert Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python alert_bot.py